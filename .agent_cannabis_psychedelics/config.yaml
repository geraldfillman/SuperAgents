# =============================================================================
# Cannabis & Psychedelic Therapeutics Agent -- Master Configuration
# =============================================================================
# Registers all skills, workflows, and data sources for the
# Cannabis MSO / Psychedelic Therapeutic Company Tracker agent.

agent:
  name: cannabis-psychedelics-tracker
  version: "0.1.0"
  description: >
    Asset-first tracking system for cannabis MSOs and psychedelic therapeutic
    companies. Primary unit of analysis is the therapeutic compound or
    licensed operation, not the company.

# ---------------------------------------------------------------------------
# Skills -- specialized capabilities the agent can invoke
# ---------------------------------------------------------------------------
skills:
  - name: scheduling_monitor
    path: skills/scheduling_monitor/SKILL.md
    description: Track DEA scheduling proposals, final rules, and state decriminalization/legalization events

  - name: state_license_tracker
    path: skills/state_license_tracker/SKILL.md
    description: Track state-level cannabis licenses (cultivation, processing, dispensary, delivery) from SEC filings

  - name: regulatory_landscape
    path: skills/regulatory_landscape/SKILL.md
    description: Monitor FDA/DEA regulatory actions on cannabis and psychedelic compounds via Federal Register

  - name: clinicaltrials_scraper
    path: skills/clinicaltrials_scraper/SKILL.md
    description: Query ClinicalTrials.gov v2 API for psychedelic and cannabis clinical trials

  - name: financial_monitor
    path: skills/financial_monitor/SKILL.md
    description: Calculate cash runway and flag equity dilution risks from SEC filings

  - name: insider_tracker
    path: skills/insider_tracker/SKILL.md
    description: Track high-signal insider trades (Form 4s) for cannabis and psychedelic companies

  - name: sec_filings_parser
    path: skills/sec_filings_parser/SKILL.md
    description: Search SEC EDGAR for filings and extract cannabis/psychedelic sector catalyst disclosures

  - name: data_quality
    path: skills/data_quality/SKILL.md
    description: Audit stale records, validate sources, track aliases, ensure data integrity

  - name: compound_scoring
    path: skills/compound_scoring/SKILL.md
    description: Score compounds on clinical, regulatory, market, and financial dimensions (0-10 each)

  - name: calendar
    path: skills/calendar/SKILL.md
    description: Build rolling catalyst calendar of trial readouts, scheduling reviews, and state votes

# ---------------------------------------------------------------------------
# Workflows -- automated research cadences
# ---------------------------------------------------------------------------
workflows:
  - name: daily_update
    path: workflows/daily_update.md
    schedule: "0 7 * * 1-5"  # 7 AM ET, weekdays
    description: Pull scheduling actions, check 8-Ks, refresh ClinicalTrials.gov, update catalyst calendar

  - name: weekly_review
    path: workflows/weekly_review.md
    schedule: "0 9 * * 1"    # Monday 9 AM ET
    description: Add new names, 90-day catalyst review, re-score compounds, audit stale records

  - name: monthly_reconciliation
    path: workflows/monthly_reconciliation.md
    schedule: "0 9 1 * *"    # 1st of month, 9 AM ET
    description: Reconcile SEC filings, archive discontinued compounds, rebuild segment coverage
